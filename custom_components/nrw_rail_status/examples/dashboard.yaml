title: NRW Rail Status
icon: mdi:train
cards:

  # --- Übersicht ---
  - type: entities
    title: Übersicht
    entities:
      - entity: sensor.nrw_rail_status_sensor
        name: Anzahl der Störungen

  # --- Statusanzeige ---
  - type: entity
    entity: sensor.nrw_rail_status_sensor
    name: Statusanzeige
    state_color: true

  # --- Details zur ersten Störung ---
  - type: markdown
    title: Details zur ersten Störung
    content: |
      {% set msgs = state_attr('sensor.nrw_rail_status_sensor', 'messages') %}
      {% set count = states('sensor.nrw_rail_status_sensor') | int %}

      **Aktuelle Störungen:** {{ count }}

      {% if msgs and msgs | length > 0 %}
      {% set first = msgs[0] %}

      ### **{{ first.title }}**

      **Beschreibung:**  
      {{ first.text }}

      **Beginn:** {{ first.start }}  
      **Ende:** {{ first.end }}

      **Priorität:** {{ first.priority }}  
      **Verbund:** {{ first.comp }}  
      **Produkt:** {{ first.product }}  
      **Meldungs-ID:** {{ first.id }}

      {% else %}
      Keine aktuellen Störungen gemeldet.
      {% endif %}

  # --- Liste aller Störungen ---
  - type: markdown
    title: Alle Störungen
    content: |
      {% set msgs = state_attr('sensor.nrw_rail_status_sensor', 'messages') %}

      {% if msgs %}
      {% for m in msgs %}
      ---
      ### **{{ m.title }}**

      **Beschreibung:**  
      {{ m.text }}

      **Beginn:** {{ m.start }}  
      **Ende:** {{ m.end }}

      **Priorität:** {{ m.priority }}  
      **Verbund:** {{ m.comp }}  
      **Produkt:** {{ m.product }}  
      **ID:** {{ m.id }}

      {% endfor %}
      {% else %}
      Keine Störungen vorhanden.
      {% endif %}
